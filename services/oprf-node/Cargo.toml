[package]
name = "world-id-oprf-node"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
license.workspace = true

[dependencies]
alloy = { workspace = true, features = ["full", "rpc", "rpc-client-ws"] }
ark-babyjubjub = { workspace = true }
ark-bn254 = { workspace = true }
ark-ff = { workspace = true }
ark-groth16 = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true, features = ["json", "macros"] }
chrono = { workspace = true }
circom-types = { workspace = true, features = [
  "bn254",
  "groth16",
  "verification-key",
  "zkey"
] }
config.workspace = true
eyre = { workspace = true }
futures = { workspace = true }
humantime = { workspace = true }
humantime-serde = { workspace = true }
metrics = { workspace = true }
moka = { workspace = true }
rustls = { workspace = true }
secrecy = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
taceo-nodes-common = { workspace = true, features = ["postgres"] }
taceo-nodes-observability = { workspace = true }
taceo-oprf = { workspace = true, features = ["core", "service", "types"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = [
  "net",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
  "tokio-macros",
] }
tokio-util = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true, features = ["serde", "v4"] }
world-id-core = { workspace = true, features = ["authenticator", "embed-zkeys"] }
world-id-primitives = { workspace = true }

[dev-dependencies]
ark-serialize.workspace = true
rand.workspace = true
world-id-proof = { workspace = true }
world-id-test-utils = { workspace = true }
