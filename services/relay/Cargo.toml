[package]
name = "world-id-relay"
edition.workspace = true
version = "0.11.4"
publish = false
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
# http
axum = { workspace = true }

# alloy
alloy = { workspace = true, features = [
    "full",
    "node-bindings",
    "rlp",
    "sol-types",
    "signer-local",
    "provider-http",
    "reqwest-rustls-tls",
] }
alloy-primitives = { workspace = true }
tempo-alloy = { workspace = true }

# async 
anchor-client = { workspace = true, features = ["async"] }
dashmap = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
futures-util = { workspace = true }

# serde
serde = { workspace = true }
serde_json = { workspace = true }

# telemetry
tracing = { workspace = true }
telemetry-batteries = { workspace = true }
metrics = { workspace = true }

# misc
clap = { workspace = true, features = ["derive", "env"] }
dotenvy = { workspace = true }
eyre = { workspace = true }
config = { workspace = true }
solana-keypair = { workspace = true }
world-id-solana-satellite = { path = "../../crates/solana-satellite" }

[[example]]
name = "create_account"
path = "scripts/create_account.rs"

[[example]]
name = "register_issuer_schema"
path = "scripts/register_issuer_schema.rs"

[dev-dependencies]
anchor-litesvm = { workspace = true }
ark-ff = { workspace = true }
ark-serialize = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
world-id-primitives = { workspace = true }
world-id-relay = { workspace = true }
world-id-test-utils = { workspace = true }

[[bin]]
name = "world-id-relay"
path = "src/bin/main.rs"
