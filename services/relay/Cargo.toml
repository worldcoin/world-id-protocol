[package]
name = "world-id-relay"
edition.workspace = true
version = "0.11.4"
publish = false
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
# http
axum = { workspace = true }

# alloy
alloy = { workspace = true, features = [
    "full",
    "node-bindings",
    "rlp",
    "sol-types",
    "signer-local",
    "provider-http",
    "reqwest-rustls-tls",
] }
alloy-primitives = { workspace = true }
tempo-alloy = { workspace = true }

# async
anchor-client = { version = "1.0.2", features = ["async"], optional = true }
dashmap = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
futures-util = { workspace = true }

# serde
serde = { workspace = true }
serde_json = { workspace = true }

# telemetry
tracing = { workspace = true }
telemetry-batteries = { workspace = true }
metrics = { workspace = true }

# misc
clap = { workspace = true, features = ["derive", "env"] }
dotenvy = { workspace = true }
eyre = { workspace = true }
solana-keypair = { version = "3.0.1", optional = true }
world-id-solana = { git = "https://github.com/worldcoin/world-id-protocol-solana", optional = true }

[features]
default = []
# Solana permissioned-gateway satellite support. Pulls in anchor-client,
# solana-keypair, and world-id-solana (and, transitively, alloy's SBF-adjacent
# deps) -- kept opt-in so builds that don't bridge to Solana can skip them.
world-id-solana = ["dep:anchor-client", "dep:solana-keypair", "dep:world-id-solana"]

[[example]]
name = "create_account"
path = "scripts/create_account.rs"

[[example]]
name = "register_issuer_schema"
path = "scripts/register_issuer_schema.rs"

[dev-dependencies]
anchor-litesvm = "0.4.0"
ark-ff = { workspace = true }
ark-serialize = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
world-id-primitives = { workspace = true }
world-id-relay = { workspace = true }
world-id-test-utils = { workspace = true }

[[bin]]
name = "world-id-relay"
path = "src/bin/main.rs"
