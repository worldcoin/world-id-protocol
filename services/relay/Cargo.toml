[package]
name = "world-id-relay"
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
repository.workspace = true
rust-version.workspace = true

[dependencies]
# internal 
world-id-services-common = { workspace = true }

# alloy
alloy = { workspace = true, features = [
    "full",
    "node-bindings",
    "rlp",
    "sol-types",
    "signer-local",
    "provider-http",
] }
alloy-primitives = { workspace = true }

# async 
dashmap = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true, features = ["full"] }
futures = { workspace = true }
futures-util = { workspace = true }

# serde
serde = { workspace = true }
serde_json = { workspace = true }

# telemetry
tracing = { workspace = true }
telemetry-batteries = { workspace = true }

# misc
clap = { workspace = true, features = ["derive", "env"] }
dotenvy = { workspace = true }
eyre = { workspace = true }
config = { workspace = true }

[[example]]
name = "create_account"
path = "scripts/create_account.rs"

[[example]]
name = "register_issuer_schema"
path = "scripts/register_issuer_schema.rs"

[[example]]
name = "check_tx_events"
path = "scripts/check_tx_events.rs"

[[example]]
name = "test_watch_logs"
path = "scripts/test_watch_logs.rs"

[[example]]
name = "debug_chain_committed"
path = "scripts/debug_chain_committed.rs"

[dev-dependencies]
ark-ff = { workspace = true }
ark-serialize = { workspace = true }
hex = { workspace = true }
rand = { workspace = true }
world-id-primitives = { workspace = true }
world-id-relay = { workspace = true }
world-id-test-utils = { workspace = true }
