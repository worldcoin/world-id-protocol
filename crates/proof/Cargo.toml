[package]
name = "world-id-proof"
description = "World ID Proof crate"
publish = true
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
rust-version.workspace = true
repository.workspace = true
include = [
    "src/**/*",
    "tests/**/*",
    "noir/**/*",
    "build.rs",
    "Cargo.toml",
    "README.md",
]

[features]
default = ["embed-zkeys"]
# Embed Circom zkeys into binary
embed-zkeys = ["dep:tar"]
# Compress the embedded zkeys to reduce binary size (ARK point compression)
compress-zkeys = ["embed-zkeys", "dep:ark-serialize", "dep:circom-types"]
# Compress the tar archive with zstd
zstd-compress-zkeys = ["embed-zkeys", "dep:zstd"]

# Embed Noir ownership proof artifacts into binary
embed-noir-artifacts = []
# Build Noir artifacts ad-hoc in build.rs instead of downloading them.
build-noir-artifacts = ["embed-noir-artifacts", "dep:generate-noir-artifacts"]

[dependencies]
ark-babyjubjub = { workspace = true }
ark-bn254 = { workspace = true }
ark-ff = { workspace = true }
ark-ec = { workspace = true }
ark-groth16 = { workspace = true }
ark-serialize = { workspace = true, optional = true }
circom-types = { workspace = true, features = ["bn254", "groth16", "zkey"], optional = true }
tar = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
zstd = { workspace = true, optional = true }
eddsa-babyjubjub = { workspace = true }
provekit-common = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
groth16-material = { workspace = true, features = ["circom"] }
ruint = { workspace = true, features = ["ark-ff-05"] }
poseidon2 = { workspace = true }
taceo-groth16-sol = { workspace = true }
taceo-oprf = { workspace = true, features = ["client", "core"] }
eyre = { workspace = true }
zeroize = { workspace = true }

# Internal
world-id-primitives = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
provekit-prover = { workspace = true }
provekit-verifier = { workspace = true }

[build-dependencies]
eyre = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
ark-serialize = { workspace = true }
circom-types = { workspace = true, features = ["bn254", "groth16", "zkey"] }
rayon = { workspace = true }
tar = { workspace = true }
zstd = { workspace = true }
generate-noir-artifacts = { workspace = true, optional = true }

[dev-dependencies]
world-id-test-utils = { workspace = true }
