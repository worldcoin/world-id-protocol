[package]
name = "world-id-proof"
description = "World ID Proof crate"
publish = true
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
homepage.workspace = true
rust-version.workspace = true
repository.workspace = true
include = [
    "src/**/*",
    "tests/**/*",
    "noir/**/*",
    "build.rs",
    "Cargo.toml",
    "README.md",
]

[features]
default = ["embed-zkeys"]
# Embed zkeys into binary
embed-zkeys = ["dep:tar"]
# Compress the embedded zkeys to reduce binary size (ARK point compression)
compress-zkeys = ["embed-zkeys", "dep:ark-serialize", "dep:circom-types"]
# Compress the tar archive with zstd
zstd-compress-zkeys = ["embed-zkeys", "dep:zstd"]

# Experimental: Feature Flags for Specific Circuits
# RATIONALE: We feature flag each circuit and based on the proving/verifying action because each require
# a proving and verifying key that generally is above >1Mb. So selecting circuits optimizes bundle size.
zk-ownership-prove = ["dep:provekit-prover", "dep:ciborium"]
zk-ownership-verify = ["dep:provekit-verifier", "dep:ciborium"]

[dependencies]
ark-babyjubjub = { workspace = true }
ark-bn254 = { workspace = true }
ark-ff = { workspace = true }
ark-ec = { workspace = true }
ark-groth16 = { workspace = true }
ark-serialize = { workspace = true, optional = true }
circom-types = { workspace = true, features = ["bn254", "groth16", "zkey"], optional = true }
tar = { workspace = true, optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
zstd = { workspace = true, optional = true }
eddsa-babyjubjub = { workspace = true }
ciborium = { workspace = true, optional = true }
provekit-common = { workspace = true }
provekit-prover = { workspace = true, optional = true }
provekit-verifier = { workspace = true, optional = true }
rand = { workspace = true }
serde = { workspace = true }
groth16-material = { workspace = true }
poseidon2 = { workspace = true }
taceo-groth16-sol = { workspace = true }
taceo-oprf = { workspace = true, features = ["client", "core"] }
eyre = { workspace = true }
zeroize = { workspace = true }

# Internal
world-id-primitives = { workspace = true }

[build-dependencies]
eyre = { workspace = true }
reqwest = { workspace = true, features = ["blocking"] }
ark-serialize = { workspace = true }
circom-types = { workspace = true, features = ["bn254", "groth16", "zkey"] }
rayon = { workspace = true }
tar = { workspace = true }
zstd = { workspace = true }
provekit-r1cs-compiler = { workspace = true }
provekit-common = { workspace = true }

[dev-dependencies]
world-id-test-utils = { workspace = true }
