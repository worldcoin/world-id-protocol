[package]
name = "webauthn"
type = "lib"
description = "Webauthn/Passkeys signature verification in Noir"
version = "0.37.2-provekit-demo"
authors = ["Oleh Misarosh <olehmisar@gmail.com>"]
repository = "https://github.com/olehmisar/noir_webauthn"
keywords = [
  "Noir",
  "webauthn",
  "passkeys",
  "authentication",
  "secp256r1",
  "p256",
]

[dependencies]
base64 = { git = "https://github.com/noir-lang/noir_base64", tag = "v0.5.0" }
bignum = { path = "../noir-bignum-mavros" }
bigcurve = { path = "../noir_bigcurve-mavros" }
nodash = { path = "../nodash" }
