[graph]
# Cargo deny will check dependencies via `--all-features`
all-features = true

[sources]
unknown-registry = "deny"

[bans]
deny = [
    { name = "openssl-sys", reason = "increases complexity for foreign binding compilation and bundle size" },
    { name = "openssl", reason = "increases complexity for foreign binding compilation and bundle size" },
    { crate = "metrics", deny-multiple-versions = true, reason = "metrics crate uses a global recorder - multiple versions may break metrics silently" },
]

[licenses]
version = 2
# We want really high confidence when inferring licenses from text
confidence-threshold = 1.0

# List of explicitly allowed licenses
# See https://spdx.org/licenses/ for list of possible licenses
allow = [
    "0BSD",
    "Apache-2.0 WITH LLVM-exception",
    "Apache-2.0",
    "BSD-2-Clause",
    # "BSD-2-Clause-Patent",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",                        # Although this is copyleft, it is scoped to modifying the original files
    "OpenSSL",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

# Ignore unmaintained required crates warning
[advisories]
ignore = [
    "RUSTSEC-2024-0388", # Unmaintained `derivative` (2024-11-22)
    "RUSTSEC-2024-0436", # Unmaintained `paste` (2025-04-04)
    "RUSTSEC-2025-0055", # `tracing-subscriber` < 0.3.20, requires bumps on `semaphore-rs` (and Ark deps) (2025-09-09)
    "RUSTSEC-2023-0089", # Unmaintained `atomic-polyfill` (2025-04-29)
    "RUSTSEC-2025-0141", # `uniffi_macros` pulls `bincode` through `zk-mobile-bench`; no safe upgrade path is available yet
    "RUSTSEC-2026-0044", # `aws-lc-sys` is pinned transitively via `aws-lc-rs`; no compatible lockfile-only update is available yet
    "RUSTSEC-2026-0048", # `aws-lc-sys` is pinned transitively via `aws-lc-rs`; no compatible lockfile-only update is available yet
    "RUSTSEC-2026-0049", # `aws-smithy-http-client` still pulls legacy `rustls` 0.21 / `rustls-webpki` 0.101.7; no compatible lockfile-only update is available yet
]
