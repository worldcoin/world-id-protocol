# Builds and pushes a versioned Docker image whenever a service release tag is pushed.
# Tags are created by release-plz: world-id-indexer-vX.Y.Z, world-id-gateway-vX.Y.Z, etc.
name: Release Service Docker Image

on:
  push:
    tags:
      - "world-id-indexer-v*"
      - "world-id-gateway-v*"
      - "world-id-oprf-node-v*"

permissions:
  contents: read

jobs:
  docker-release:
    name: Docker Release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Parse tag
        id: parse
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Strip the leading "world-id-" prefix to get "<service>-vX.Y.Z"
          SUFFIX="${TAG#world-id-}"
          # Service name is everything before the last "-vX.Y.Z" segment
          SERVICE="${SUFFIX%-v*}"
          VERSION="${TAG##*-}"   # e.g. v1.2.3
          # Detect pre-release: version contains a hyphen after the numeric part (e.g. v1.2.3-alpha.1)
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            IS_PRERELEASE=false
          else
            IS_PRERELEASE=true
          fi
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}/world-id-${{ steps.parse.outputs.service }}
          tags: |
            type=raw,value=${{ steps.parse.outputs.version }}
            type=raw,value=latest,enable=${{ steps.parse.outputs.is_prerelease == 'false' }}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: "type=gha,mode=max"
          platforms: linux/amd64
          build-args: |
            SERVICE_NAME=world-id-${{ steps.parse.outputs.service }}
            GIT_HASH=${{ github.sha }}

      - name: Attest
        uses: actions/attest-build-provenance@v1
        with:
          push-to-registry: true
          subject-name: ghcr.io/${{ github.repository }}/world-id-${{ steps.parse.outputs.service }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}
