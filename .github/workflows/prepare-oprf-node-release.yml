name: Prepare OPRF Node Release

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-oprf-node-release:
    name: Prepare OPRF Node Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version and find changelog base tag
        id: version
        run: |
          set -euo pipefail

          # Version is set manually in Cargo.toml before running this workflow
          VERSION=$(grep -m1 '^version = ' services/oprf-node/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

          # The base tag is the latest existing stable release (world-id-oprf-node-vX.Y.Z).
          # We cannot use world-id-oprf-node-v${VERSION} because that tag does not exist yet.
          BASE_TAG=$(git tag -l 'world-id-oprf-node-v*' \
            | grep -E '^world-id-oprf-node-v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          echo "base_tag=${BASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION}, changelog base: ${BASE_TAG}"

      - name: Generate changelog entries
        id: changelog
        run: |
          set -euo pipefail

          BASE_TAG="${{ steps.version.outputs.base_tag }}"
          VERSION="${{ steps.version.outputs.value }}"

          ADDED_FILE=$(mktemp)
          FIXED_FILE=$(mktemp)
          OTHER_FILE=$(mktemp)
          SECTION_FILE=$(mktemp)

          while IFS= read -r subject; do
            [ -z "$subject" ] && continue

            # Extract trailing PR number: (#NNN)
            PR_NUM=$(echo "$subject" | grep -oE '\(#[0-9]+\)$' | grep -oE '[0-9]+' || true)

            # Strip PR reference for conventional commit parsing
            CLEAN=$(echo "$subject" | sed 's/ (#[0-9]*)\s*$//')

            # Parse type, optional scope, description
            TYPE=$(echo "$CLEAN" | grep -oE '^[a-z]+' || true)
            SCOPE=$(echo "$CLEAN" | sed -n 's/^[a-z!]*(\([^)]*\)).*/\1/p' || true)
            DESC=$(echo "$CLEAN" | sed 's/^[^:]*: //' || true)

            if [ -n "$PR_NUM" ]; then
              PR_LINK=" ([#${PR_NUM}](https://github.com/worldcoin/world-id-protocol/pull/${PR_NUM}))"
            else
              PR_LINK=""
            fi

            if [ -n "$SCOPE" ]; then
              ENTRY="- *(${SCOPE})* ${DESC}${PR_LINK}"
            else
              ENTRY="- ${DESC}${PR_LINK}"
            fi

            case "$TYPE" in
              feat) echo "$ENTRY" >> "$ADDED_FILE" ;;
              fix)  echo "$ENTRY" >> "$FIXED_FILE" ;;
              *)    echo "$ENTRY" >> "$OTHER_FILE" ;;
            esac
          done <<< "$(git log --format='%s' "${BASE_TAG}..HEAD" -- services/oprf-node/)"

          # Assemble the section file
          DATE=$(date -u +%Y-%m-%d)
          echo "## [${VERSION}](https://github.com/worldcoin/world-id-protocol/releases/tag/world-id-oprf-node-v${VERSION}) - ${DATE}" >> "$SECTION_FILE"

          if [ -s "$ADDED_FILE" ]; then
            echo "" >> "$SECTION_FILE"
            echo "### Added" >> "$SECTION_FILE"
            echo "" >> "$SECTION_FILE"
            cat "$ADDED_FILE" >> "$SECTION_FILE"
          fi
          if [ -s "$FIXED_FILE" ]; then
            echo "" >> "$SECTION_FILE"
            echo "### Fixed" >> "$SECTION_FILE"
            echo "" >> "$SECTION_FILE"
            cat "$FIXED_FILE" >> "$SECTION_FILE"
          fi
          if [ -s "$OTHER_FILE" ]; then
            echo "" >> "$SECTION_FILE"
            echo "### Other" >> "$SECTION_FILE"
            echo "" >> "$SECTION_FILE"
            cat "$OTHER_FILE" >> "$SECTION_FILE"
          fi

          echo "section_file=${SECTION_FILE}" >> "$GITHUB_OUTPUT"
          echo "Generated changelog section:"
          cat "$SECTION_FILE"

      - name: Update CHANGELOG.md
        run: |
          set -euo pipefail

          SECTION_FILE="${{ steps.changelog.outputs.section_file }}"

          # Insert after ## [Unreleased], replacing the blank lines that follow it
          export SECTION_FILE
          python3 - <<'PYEOF'
          import re, os

          with open('services/oprf-node/CHANGELOG.md', 'r') as f:
              content = f.read()

          with open(os.environ['SECTION_FILE'], 'r') as f:
              section = f.read().rstrip('\n')

          def insert_section(m):
              return m.group(1) + '\n\n' + section + '\n\n'

          new_content = re.sub(
              r'(## \[Unreleased\])\n+',
              insert_section,
              content,
              count=1,
          )

          with open('services/oprf-node/CHANGELOG.md', 'w') as f:
              f.write(new_content)
          PYEOF

      - name: Create release branch and commit
        id: branch
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.value }}"
          BRANCH="release-plz-oprf-node-$(date +%s)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add services/oprf-node/CHANGELOG.md
          git commit -m "chore(world-id-oprf-node): release v${VERSION}"
          git push origin "$BRANCH"

          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        run: |
          set -euo pipefail

          VERSION="${{ steps.version.outputs.value }}"
          SECTION_FILE="${{ steps.changelog.outputs.section_file }}"
          BRANCH="${{ steps.branch.outputs.branch }}"

          gh pr create \
            --title "chore(world-id-oprf-node): release v${VERSION}" \
            --body "$(cat "$SECTION_FILE")" \
            --label "release" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
