name: Release OPRF Node

on:
  push:
    tags:
      - "world-id-oprf-node-v*"

permissions:
  contents: read

jobs:
  guard:
    name: Guard (tag must be on main)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME does not point to a commit reachable from main."
            exit 1
          fi

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#world-id-oprf-node-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  github-release:
    name: Create GitHub Release
    needs: guard
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate release notes with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            --current
            --tag-pattern "world-id-oprf-node-v.*"
            --include-path "services/oprf-node/**"
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file RELEASE_NOTES.md

  build-docker:
    name: Build Docker
    needs: guard
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    uses: ./.github/workflows/build-docker.yml
    with:
      service: oprf-node
      version: ${{ needs.guard.outputs.version }}
    secrets: inherit

  changelog-pr:
    name: Open Changelog PR
    needs: github-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Update changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: >-
            --tag-pattern "world-id-oprf-node-v.*"
            --include-path "services/oprf-node/**"
        env:
          OUTPUT: services/oprf-node/CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: changelog/oprf-node-${{ github.ref_name }}
          commit-message: "chore: update oprf-node changelog for ${{ github.ref_name }}"
          title: "chore: update oprf-node changelog for ${{ github.ref_name }}"
          body: |
            Automated changelog update for `${{ github.ref_name }}` generated by [git-cliff](https://git-cliff.org).
          labels: changelog
