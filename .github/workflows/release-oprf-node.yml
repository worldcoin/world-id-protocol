name: Release OPRF Node

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release OPRF Node
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs['services/oprf-node--release_created'] }}
      version: ${{ steps.release.outputs['services/oprf-node--version'] }}
    steps:
      - name: Run release-please release
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-docker:
    name: Build Docker
    needs: release
    if: needs.release.outputs.released == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write
    uses: ./.github/workflows/build-docker.yml
    with:
      service: oprf-node
      version: v${{ needs.release.outputs.version }}
    secrets: inherit
