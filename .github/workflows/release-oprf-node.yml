name: Release OPRF Node

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    name: Release OPRF Node
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release-plz.outputs.releases_created }}
      version: ${{ steps.version.outputs.value }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9
        with:
          toolchain: stable

      - name: Run release-plz release
        id: release-plz
        uses: release-plz/action@1528104d2ca23787631a1c1f022abb64b34c1e11 # v0.5.128 (https://github.com/release-plz/action/releases/tag/v0.5.128)
        with:
          command: release
          config: services/oprf-node/release-plz.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image version
        if: steps.release-plz.outputs.releases_created == 'true'
        id: version
        run: |
          set -euo pipefail
          version="$(cargo metadata --format-version 1 --no-deps \
            --manifest-path services/oprf-node/Cargo.toml \
            | jq -er '.packages[] | select(.name == "world-id-oprf-node") | .version')"
          echo "value=v$version" >> "$GITHUB_OUTPUT"

  build-docker:
    name: Build Docker
    needs: release
    if: needs.release.outputs.released == 'true'
    uses: ./.github/workflows/build-docker.yml
    with:
      service: oprf-node
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
