name: Compile Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: compile-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile the workspace
        run: cargo test --all --locked --no-run
      - name: Validate controller fixtures
        run: node --test .github/scripts/__tests__/mobench-controller.test.mjs
