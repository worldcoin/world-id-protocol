name: Compile Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: compile-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Build contracts
        run: make sol-build
      - name: Compile the workspace
        env:
          CONTRACTS_PREBUILT: "1"
        run: cargo test --all --locked --no-run
