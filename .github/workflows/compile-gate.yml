name: Compile Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: compile-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: noir-lang/noirup@7dbe69ccc78877f0200ffa5a40836c953d2cfd8f # v0.1.4
        with:
          # See https://github.com/worldfnd/provekit, a specific nargo toolchain version is required.
          toolchain: v1.0.0-beta.11
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
      - name: Build contracts
        run: make sol-build
      - name: Compile the workspace
        env:
          CONTRACTS_PREBUILT: "1"
        run: cargo test --all --locked --no-run
