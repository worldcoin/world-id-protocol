on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - contracts/**/*
      - crates/registry/abi/**/*
      - crates/issuer/abi/**/*

permissions:
  contents: read

name: Contracts CI

env:
  FOUNDRY_PROFILE: ci
  WORLDCHAIN_PROVIDER: "${{ secrets.WORLDCHAIN_PROVIDER }}"
  ETHEREUM_PROVIDER: "${{ secrets.ETHEREUM_PROVIDER }}"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Forge dependencies
        uses: actions/cache@v4
        with:
          path: contracts/lib
          key: ${{ runner.os }}-forge-${{ hashFiles('contracts/foundry.lock', 'contracts/foundry.toml') }}
          restore-keys: |
            ${{ runner.os }}-forge-

      - name: Install dependencies
        run: forge install

      - name: Run tests
        run: forge test -vvv

      - name: Check formatting
        run: forge fmt --check

  check-abis:
    name: Check ABIs are up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Forge dependencies
        uses: actions/cache@v4
        with:
          path: contracts/lib
          key: ${{ runner.os }}-forge-${{ hashFiles('contracts/foundry.lock', 'contracts/foundry.toml') }}
          restore-keys: |
            ${{ runner.os }}-forge-

      - name: Regenerate ABIs
        run: make sol-build

      - name: Check for ABI changes
        run: |
          if ! git diff --exit-code crates/registry/abi/ crates/issuer/abi/; then
            echo "::error::ABI files are out of sync with contracts. Run 'make sol-build' and commit the changes."
            exit 1
          fi
