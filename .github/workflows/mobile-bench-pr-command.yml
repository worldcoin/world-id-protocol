name: Mobile Bench PR Command

on:
  issue_comment:
    types:
      - created

permissions:
  actions: write
  contents: read
  pull-requests: read
  issues: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}

      - uses: actions/github-script@v7
        with:
          script: |
            const controller = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/mobench-controller.mjs`);
            await controller.handleIssueCommentEvent({ github, context, core });
