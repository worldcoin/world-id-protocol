name: Mobile Bench PR Command

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  actions: write
  pull-requests: read
  issues: write

jobs:
  dispatch:
    uses: worldcoin/mobile-bench-rs/.github/workflows/reusable-pr-command.yml@v0.1.19-patch-1
    with:
      benchmark_workflow: .github/workflows/mobile-bench.yml
      crate_path: ./crates/zk-mobile-bench
      functions: '["zk_mobile_bench::bench_nullifier_proof_generation","zk_mobile_bench::bench_nullifier_witness_generation_only","zk_mobile_bench::bench_nullifier_proving_only","zk_mobile_bench::bench_query_proof_generation","zk_mobile_bench::bench_query_proof_only","zk_mobile_bench::bench_query_witness_generation_only","zk_mobile_bench::bench_query_proving_only"]'
