name: Mobile Bench After CI

on:
  workflow_run:
    workflows: ["Compile Gate"]
    types: [completed]

permissions:
  actions: write
  contents: read
  pull-requests: read

concurrency:
  group: mobench-after-ci-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  dispatch:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.workflow_sha }}
      - uses: actions/github-script@v7
        with:
          script: |
            const controller = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/mobench-controller.mjs`);
            await controller.handleWorkflowRun({ github, context, core });
