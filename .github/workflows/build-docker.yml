# Builds the Docker images for the services and pushes them to the GitHub Container Registry attested
name: Build Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'world-id-indexer-v*'
      - 'world-id-gateway-v*'
      - 'world-id-oprf-node-v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - indexer
          - gateway
          - oprf-node
    # On a branch push (or workflow_dispatch): build all services.
    # On a tag push: only build the service the tag belongs to.
    if: |
      github.ref_type == 'branch' ||
      startsWith(github.ref_name, format('world-id-{0}-v', matrix.service))
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Parse version from tag
        id: tag
        if: github.ref_type == 'tag'
        run: |
          VERSION="${GITHUB_REF_NAME#world-id-${{ matrix.service }}-}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # latest only for stable releases (no pre-release suffix like -alpha, -rc.1)
          if [[ "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}/world-id-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || steps.tag.outputs.is_stable == 'true' }}
            type=sha
            type=raw,value=${{ steps.tag.outputs.version }},enable=${{ github.ref_type == 'tag' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: "type=gha,mode=max"
          platforms: linux/amd64
          build-args: |
            SERVICE_NAME=world-id-${{ matrix.service }}
            GIT_HASH=${{ github.sha }}

      - name: Attest
        uses: actions/attest-build-provenance@v1
        with:
          push-to-registry: true
          subject-name: ghcr.io/${{ github.repository }}/world-id-${{ matrix.service }}
          subject-digest: ${{ steps.docker_build.outputs.digest }}