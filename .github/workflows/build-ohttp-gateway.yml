# Builds the OHTTP gateway image from cloudflare/privacy-gateway-server-go and pushes it to ghcr.io
name: Build OHTTP Gateway Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ohttp-gateway.yml"
  workflow_dispatch:

env:
  CF_REPO: cloudflare/privacy-gateway-server-go
  VERSION: v0.0.3

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
      attestations: write

    steps:
      - name: Checkout CF repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CF_REPO }}
          ref: ${{ env.VERSION }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ghcr.io/${{ github.repository }}/ohttp-gateway
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=${{ env.VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build
        id: docker_build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: "type=gha,mode=max"
          platforms: linux/amd64
          build-args: |
            GIT_REVISION=${{ env.VERSION }}

      - name: Attest
        uses: actions/attest-build-provenance@v1
        with:
          push-to-registry: true
          subject-name: ghcr.io/${{ github.repository }}/ohttp-gateway
          subject-digest: ${{ steps.docker_build.outputs.digest }}
