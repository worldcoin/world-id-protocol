name: Reusable Mobile Benchmark (BrowserStack)

on:
  workflow_call:
    inputs:
      crate_path:
        description: "Path to the benchmark crate in the caller repo"
        required: true
        type: string
      functions:
        description: "JSON array of benchmark function names to run"
        required: true
        type: string
      iterations:
        description: "Number of benchmark iterations"
        required: false
        type: string
        default: "30"
      warmup:
        description: "Number of warmup iterations"
        required: false
        type: string
        default: "5"
      platform:
        description: "Target platform: android, ios, or both"
        required: false
        type: string
        default: "both"
      device_profile:
        description: "Device profile: low-spec, mid-spec, high-spec, custom"
        required: false
        type: string
        default: "low-spec"
      ios_device:
        description: "Custom iOS device name (required when device_profile=custom)"
        required: false
        type: string
      ios_os_version:
        description: "Custom iOS OS version (required when device_profile=custom)"
        required: false
        type: string
      android_device:
        description: "Custom Android device name (required when device_profile=custom)"
        required: false
        type: string
      android_os_version:
        description: "Custom Android OS version (required when device_profile=custom)"
        required: false
        type: string
      rust_targets_ios:
        description: "Comma-separated iOS Rust targets"
        required: false
        type: string
        default: "aarch64-apple-ios,aarch64-apple-ios-sim"
      rust_targets_android:
        description: "Comma-separated Android Rust targets"
        required: false
        type: string
        default: "aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android"
      build_release:
        description: "Build in release mode"
        required: false
        type: boolean
        default: true
      mobench_version:
        description: "Mobench version to install"
        required: false
        type: string
        default: "0.1.16"
      mobench_ref:
        description: "Git ref for mobile-bench-rs (overrides mobench_version when set)"
        required: false
        type: string
      pr_number:
        description: "PR number for reporting"
        required: false
        type: string
      base_ref:
        description: "Base branch for baseline selection metadata"
        required: false
        type: string
      head_sha:
        description: "Exact commit SHA to benchmark and report against"
        required: false
        type: string
      requested_by:
        description: "Who triggered the run"
        required: false
        type: string
      dispatch_id:
        description: "GitHub App dispatch correlation id"
        required: false
        type: string
      trigger_source:
        description: "Trigger source for manifest metadata"
        required: false
        type: string
        default: "workflow_dispatch"
      request_command:
        description: "Original request command for manifest metadata"
        required: false
        type: string
      check_run_name:
        description: "GitHub Check Run name"
        required: false
        type: string
        default: "Mobench"
      regression_threshold_pct:
        description: "Regression threshold percentage"
        required: false
        type: string
        default: "5.0"
    secrets:
      BROWSERSTACK_USERNAME:
        required: true
      BROWSERSTACK_ACCESS_KEY:
        required: true
      MOBENCH_APP_PRIVATE_KEY:
        required: false
      MOBENCH_APP_ID:
        required: false

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # iOS BrowserStack benchmark
  # ---------------------------------------------------------------------------
  ios:
    name: iOS BrowserStack benchmark
    if: inputs.platform == 'ios' || inputs.platform == 'both'
    runs-on: macos-15
    outputs:
      device_name: ${{ steps.resolve_device.outputs.device_name }}
      os_version: ${{ steps.resolve_device.outputs.os_version }}

    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"
      CFLAGS_aarch64_apple_ios: "-miphoneos-version-min=13.0"
      CFLAGS_aarch64_apple_ios_sim: "-mios-simulator-version-min=13.0"
      CFLAGS_x86_64_apple_ios: "-mios-simulator-version-min=13.0"
      CARGO_TARGET_AARCH64_APPLE_IOS_RUSTFLAGS: "-C link-arg=-miphoneos-version-min=13.0"
      CARGO_TARGET_AARCH64_APPLE_IOS_SIM_RUSTFLAGS: "-C link-arg=-mios-simulator-version-min=13.0"
      CARGO_TARGET_X86_64_APPLE_IOS_RUSTFLAGS: "-C link-arg=-mios-simulator-version-min=13.0"

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}
          path: caller

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust_targets_ios }}

      - name: Cache cargo registry/git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('caller/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: caller/target
          key: ${{ runner.os }}-target-ios-${{ hashFiles('caller/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-ios-

      - name: Install mobench
        shell: bash
        env:
          MOBENCH_VERSION: ${{ inputs.mobench_version }}
          MOBENCH_REF: ${{ inputs.mobench_ref }}
        run: |
          if [ -n "$MOBENCH_REF" ]; then
            if [[ "$MOBENCH_REF" == refs/heads/* ]]; then
              mobench_ref_flag=(--branch "${MOBENCH_REF#refs/heads/}")
            elif [[ "$MOBENCH_REF" == refs/tags/* ]]; then
              mobench_ref_flag=(--tag "${MOBENCH_REF#refs/tags/}")
            elif [[ "$MOBENCH_REF" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              mobench_ref_flag=(--rev "$MOBENCH_REF")
            else
              mobench_ref_flag=(--branch "$MOBENCH_REF")
            fi
            cargo install mobench \
              --git https://github.com/worldcoin/mobile-bench-rs \
              "${mobench_ref_flag[@]}" \
              --locked
          elif [ -n "$MOBENCH_VERSION" ]; then
            cargo install mobench --version "$MOBENCH_VERSION" --locked
          else
            cargo install mobench --locked
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Resolve iOS device
        id: resolve_device
        working-directory: caller
        shell: bash
        env:
          DEVICE_PROFILE: ${{ inputs.device_profile }}
          IOS_DEVICE_OVERRIDE: ${{ inputs.ios_device }}
          IOS_OS_VERSION_OVERRIDE: ${{ inputs.ios_os_version }}
        run: |
          if [ -n "$IOS_DEVICE_OVERRIDE" ] && [ -n "$IOS_OS_VERSION_OVERRIDE" ]; then
            echo "device_name=${IOS_DEVICE_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "os_version=${IOS_OS_VERSION_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Using custom device: ${IOS_DEVICE_OVERRIDE} (${IOS_OS_VERSION_OVERRIDE})"
          else
            output=$(cargo-mobench devices resolve \
              --platform ios \
              --config "${{ inputs.crate_path }}/bench-config.ios.toml" \
              --profile "${DEVICE_PROFILE}" \
              --format json 2>&1) || {
                echo "::error::Failed to resolve iOS device: $output"
                exit 1
              }
            device_name=$(echo "$output" | jq -r '.device // .name')
            os_version=$(echo "$output" | jq -r '.os_version')
            echo "device_name=${device_name}" >> "$GITHUB_OUTPUT"
            echo "os_version=${os_version}" >> "$GITHUB_OUTPUT"
            echo "Resolved iOS device: ${device_name} (${os_version})"
          fi

      - name: Build iOS artifacts
        working-directory: caller
        shell: bash
        env:
          RELEASE_FLAG: ${{ inputs.build_release && '--release' || '' }}
        run: |
          set -euo pipefail
          cargo-mobench build --target ios $RELEASE_FLAG --crate-path "${{ inputs.crate_path }}"
          cargo-mobench package-ipa --method adhoc
          cargo-mobench package-xcuitest
          test -f target/mobench/ios/BenchRunner.ipa
          test -f target/mobench/ios/BenchRunnerUITests.zip

      - name: Run iOS benchmarks
        working-directory: caller
        shell: bash
        env:
          FUNCTIONS_JSON: ${{ inputs.functions }}
          ITERATIONS: ${{ inputs.iterations }}
          WARMUP: ${{ inputs.warmup }}
          IOS_DEVICE: ${{ steps.resolve_device.outputs.device_name }}
          IOS_OS_VERSION: ${{ steps.resolve_device.outputs.os_version }}
          RELEASE_FLAG: ${{ inputs.build_release && '--release' || '' }}
        run: |
          set -euo pipefail
          mkdir -p target/mobench/ci/ios

          device_spec="${IOS_DEVICE}-${IOS_OS_VERSION}"
          echo "Running iOS benchmarks on: ${device_spec}"

          for func in $(echo "$FUNCTIONS_JSON" | jq -r '.[]'); do
            slug=$(echo "$func" | tr ':' '_' | tr '/' '-')
            echo "::group::Benchmark: ${func}"
            cargo-mobench run \
              --target ios \
              --crate-path "${{ inputs.crate_path }}" \
              --function "${func}" \
              --iterations "${ITERATIONS}" \
              --warmup "${WARMUP}" \
              --devices "${device_spec}" \
              $RELEASE_FLAG \
              --fetch \
              --summary-csv \
              --output "target/mobench/ci/ios/${slug}.json" || {
                echo "::warning::iOS benchmark failed for function: ${func}"
              }
            echo "::endgroup::"
          done

      - name: Upload iOS results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobench-results-ios
          path: |
            caller/target/mobench/ci/ios/*.json
            caller/target/mobench/ci/ios/*.csv
            caller/target/browserstack/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Android BrowserStack benchmark
  # ---------------------------------------------------------------------------
  android:
    name: Android BrowserStack benchmark
    if: inputs.platform == 'android' || inputs.platform == 'both'
    runs-on: macos-14
    outputs:
      device_name: ${{ steps.resolve_device.outputs.device_name }}
      os_version: ${{ steps.resolve_device.outputs.os_version }}

    env:
      BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
      BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.head_sha || github.sha }}
          path: caller

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ inputs.rust_targets_android }}

      - name: Cache cargo registry/git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('caller/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-android-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: caller/target
          key: ${{ runner.os }}-target-android-${{ hashFiles('caller/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-target-android-

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0
            ndk;26.1.10909125

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Install mobench
        shell: bash
        env:
          MOBENCH_VERSION: ${{ inputs.mobench_version }}
          MOBENCH_REF: ${{ inputs.mobench_ref }}
        run: |
          if [ -n "$MOBENCH_REF" ]; then
            if [[ "$MOBENCH_REF" == refs/heads/* ]]; then
              mobench_ref_flag=(--branch "${MOBENCH_REF#refs/heads/}")
            elif [[ "$MOBENCH_REF" == refs/tags/* ]]; then
              mobench_ref_flag=(--tag "${MOBENCH_REF#refs/tags/}")
            elif [[ "$MOBENCH_REF" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              mobench_ref_flag=(--rev "$MOBENCH_REF")
            else
              mobench_ref_flag=(--branch "$MOBENCH_REF")
            fi
            cargo install mobench \
              --git https://github.com/worldcoin/mobile-bench-rs \
              "${mobench_ref_flag[@]}" \
              --locked
          elif [ -n "$MOBENCH_VERSION" ]; then
            cargo install mobench --version "$MOBENCH_VERSION" --locked
          else
            cargo install mobench --locked
          fi

      - name: Resolve Android device
        id: resolve_device
        working-directory: caller
        shell: bash
        env:
          DEVICE_PROFILE: ${{ inputs.device_profile }}
          ANDROID_DEVICE_OVERRIDE: ${{ inputs.android_device }}
          ANDROID_OS_VERSION_OVERRIDE: ${{ inputs.android_os_version }}
        run: |
          if [ -n "$ANDROID_DEVICE_OVERRIDE" ] && [ -n "$ANDROID_OS_VERSION_OVERRIDE" ]; then
            echo "device_name=${ANDROID_DEVICE_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "os_version=${ANDROID_OS_VERSION_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Using custom device: ${ANDROID_DEVICE_OVERRIDE} (${ANDROID_OS_VERSION_OVERRIDE})"
          else
            output=$(cargo-mobench devices resolve \
              --platform android \
              --config "${{ inputs.crate_path }}/bench-config.android.toml" \
              --profile "${DEVICE_PROFILE}" \
              --format json 2>&1) || {
                echo "::error::Failed to resolve Android device: $output"
                exit 1
              }
            device_name=$(echo "$output" | jq -r '.device // .name')
            os_version=$(echo "$output" | jq -r '.os_version')
            echo "device_name=${device_name}" >> "$GITHUB_OUTPUT"
            echo "os_version=${os_version}" >> "$GITHUB_OUTPUT"
            echo "Resolved Android device: ${device_name} (${os_version})"
          fi

      - name: Build Android artifacts
        working-directory: caller
        shell: bash
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          RELEASE_FLAG: ${{ inputs.build_release && '--release' || '' }}
        run: |
          set -euo pipefail
          cargo-mobench build --target android $RELEASE_FLAG --crate-path "${{ inputs.crate_path }}"

      - name: Run Android benchmarks
        working-directory: caller
        shell: bash
        env:
          FUNCTIONS_JSON: ${{ inputs.functions }}
          ITERATIONS: ${{ inputs.iterations }}
          WARMUP: ${{ inputs.warmup }}
          ANDROID_DEVICE: ${{ steps.resolve_device.outputs.device_name }}
          ANDROID_OS_VERSION: ${{ steps.resolve_device.outputs.os_version }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
          RELEASE_FLAG: ${{ inputs.build_release && '--release' || '' }}
        run: |
          set -euo pipefail
          mkdir -p target/mobench/ci/android

          device_spec="${ANDROID_DEVICE}-${ANDROID_OS_VERSION}"
          echo "Running Android benchmarks on: ${device_spec}"

          for func in $(echo "$FUNCTIONS_JSON" | jq -r '.[]'); do
            slug=$(echo "$func" | tr ':' '_' | tr '/' '-')
            echo "::group::Benchmark: ${func}"
            cargo-mobench run \
              --target android \
              --crate-path "${{ inputs.crate_path }}" \
              --function "${func}" \
              --iterations "${ITERATIONS}" \
              --warmup "${WARMUP}" \
              --devices "${device_spec}" \
              $RELEASE_FLAG \
              --fetch \
              --summary-csv \
              --output "target/mobench/ci/android/${slug}.json" || {
                echo "::warning::Android benchmark failed for function: ${func}"
              }
            echo "::endgroup::"
          done

      - name: Upload Android results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobench-results-android
          path: |
            caller/target/mobench/ci/android/*.json
            caller/target/mobench/ci/android/*.csv
            caller/target/browserstack/**
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Summarize results from both platforms
  # ---------------------------------------------------------------------------
  summarize:
    name: Summarize benchmark results
    needs: [ios, android]
    if: always() && (needs.ios.result == 'success' || needs.android.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install mobench
        shell: bash
        env:
          MOBENCH_VERSION: ${{ inputs.mobench_version }}
          MOBENCH_REF: ${{ inputs.mobench_ref }}
        run: |
          if [ -n "$MOBENCH_REF" ]; then
            if [[ "$MOBENCH_REF" == refs/heads/* ]]; then
              mobench_ref_flag=(--branch "${MOBENCH_REF#refs/heads/}")
            elif [[ "$MOBENCH_REF" == refs/tags/* ]]; then
              mobench_ref_flag=(--tag "${MOBENCH_REF#refs/tags/}")
            elif [[ "$MOBENCH_REF" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              mobench_ref_flag=(--rev "$MOBENCH_REF")
            else
              mobench_ref_flag=(--branch "$MOBENCH_REF")
            fi
            cargo install mobench \
              --git https://github.com/worldcoin/mobile-bench-rs \
              "${mobench_ref_flag[@]}" \
              --locked
          elif [ -n "$MOBENCH_VERSION" ]; then
            cargo install mobench --version "$MOBENCH_VERSION" --locked
          else
            cargo install mobench --locked
          fi

      - name: Download iOS results
        if: needs.ios.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mobench-results-ios
          path: results/ios

      - name: Download Android results
        if: needs.android.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mobench-results-android
          path: results/android

      - name: Summarize iOS results
        if: needs.ios.result == 'success'
        shell: bash
        run: |
          mkdir -p results/ios
          cargo-mobench ci summarize \
            --results-dir results/ios \
            --output-format json \
            --output-file results/ios/summary.json
          cargo-mobench ci summarize \
            --results-dir results/ios \
            --output-format markdown \
            --output-file results/ios/summary.md
          cargo-mobench summary results/ios/summary.json --format csv > results/ios/results.csv

          echo "## iOS Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -d results/ios ]; then
            cargo-mobench ci summarize \
              --results-dir results/ios \
              --output-format table || true

            cargo-mobench ci summarize \
              --results-dir results/ios \
              --output-format markdown \
              --output-file /tmp/ios-summary.md || true

            if [ -f /tmp/ios-summary.md ]; then
              cat /tmp/ios-summary.md >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No iOS results found." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize Android results
        if: needs.android.result == 'success'
        shell: bash
        run: |
          mkdir -p results/android
          cargo-mobench ci summarize \
            --results-dir results/android \
            --output-format json \
            --output-file results/android/summary.json
          cargo-mobench ci summarize \
            --results-dir results/android \
            --output-format markdown \
            --output-file results/android/summary.md
          cargo-mobench summary results/android/summary.json --format csv > results/android/results.csv

          echo "## Android Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -d results/android ]; then
            cargo-mobench ci summarize \
              --results-dir results/android \
              --output-format table || true

            cargo-mobench ci summarize \
              --results-dir results/android \
              --output-format markdown \
              --output-file /tmp/android-summary.md || true

            if [ -f /tmp/android-summary.md ]; then
              cat /tmp/android-summary.md >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No Android results found." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # NOTE: This step requires the caller workflow to have `pull-requests: write` permission
      # so that github.token can post/update PR comments.
      - name: Post sticky PR comment
        if: inputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          MARKER="<!-- mobench-summary -->"

          # Build markdown body
          BODY="${MARKER}
          ## Mobench Benchmark Results

          "
          for dir in results/ios results/android; do
            if [ -d "$dir" ]; then
              PLATFORM_MD=$(cargo-mobench ci summarize --results-dir "$dir" --output-format markdown 2>/dev/null || true)
              if [ -n "$PLATFORM_MD" ]; then
                BODY="${BODY}${PLATFORM_MD}

          "
              fi
            fi
          done

          BODY="${BODY}
          ---
          *Posted by [mobench](https://github.com/worldcoin/mobile-bench-rs) · $(date -u '+%Y-%m-%d %H:%M UTC')*"

          # Find existing comment with marker
          EXISTING_COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            2>/dev/null | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            # Update existing comment
            gh api "repos/${REPO}/issues/comments/${EXISTING_COMMENT_ID}" \
              -X PATCH \
              -f body="${BODY}" \
              --silent
            echo "Updated existing PR comment #${EXISTING_COMMENT_ID}"
          else
            # Create new comment
            gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
              -f body="${BODY}" \
              --silent
            echo "Created new PR comment"
          fi

      - name: Build canonical history bundle
        shell: bash
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          CHECK_RUN_NAME: ${{ inputs.check_run_name }}
          DISPATCH_ID: ${{ inputs.dispatch_id }}
          TRIGGER_SOURCE: ${{ inputs.trigger_source }}
          REQUEST_COMMAND: ${{ inputs.request_command }}
          REQUESTED_BY: ${{ inputs.requested_by }}
          MOBENCH_VERSION: ${{ inputs.mobench_version }}
          MOBENCH_REF: ${{ inputs.mobench_ref }}
          HEAD_SHA: ${{ inputs.head_sha || github.event.pull_request.head.sha || github.sha }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
          BASE_REF: ${{ inputs.base_ref || github.base_ref || 'main' }}
          IOS_DEVICE_NAME: ${{ needs.ios.outputs.device_name }}
          IOS_OS_VERSION: ${{ needs.ios.outputs.os_version }}
          ANDROID_DEVICE_NAME: ${{ needs.android.outputs.device_name }}
          ANDROID_OS_VERSION: ${{ needs.android.outputs.os_version }}
        run: |
          set -euo pipefail
          mkdir -p history-bundle

          if [ -d results/ios ]; then
            mkdir -p history-bundle/ios
            cp results/ios/summary.json history-bundle/ios/summary.json
            cp results/ios/summary.md history-bundle/ios/summary.md
            cp results/ios/results.csv history-bundle/ios/results.csv
          fi

          if [ -d results/android ]; then
            mkdir -p history-bundle/android
            cp results/android/summary.json history-bundle/android/summary.json
            cp results/android/summary.md history-bundle/android/summary.md
            cp results/android/results.csv history-bundle/android/results.csv
          fi

          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg workflow_name "${{ github.workflow }}" \
            --argjson run_id "${{ github.run_id }}" \
            --argjson run_attempt "${{ github.run_attempt }}" \
            --arg head_sha "${HEAD_SHA}" \
            --arg head_ref "${HEAD_REF}" \
            --arg base_ref "${BASE_REF}" \
            --arg dispatch_id "${DISPATCH_ID}" \
            --arg trigger_source "${TRIGGER_SOURCE}" \
            --arg requested_by "${REQUESTED_BY:-${GITHUB_ACTOR}}" \
            --arg workflow_requested_by "${REQUESTED_BY:-${GITHUB_ACTOR}}" \
            --arg request_command "${REQUEST_COMMAND}" \
            --arg pr_number "${PR_NUMBER}" \
            --arg mobench_version "${MOBENCH_VERSION}" \
            --arg mobench_ref "${MOBENCH_REF:-${GITHUB_SHA}}" \
            --arg check_run_name "${CHECK_RUN_NAME}" \
            --arg ios_device_name "${IOS_DEVICE_NAME}" \
            --arg ios_os_version "${IOS_OS_VERSION}" \
            --arg android_device_name "${ANDROID_DEVICE_NAME}" \
            --arg android_os_version "${ANDROID_OS_VERSION}" \
            '{
              schema_version: "mobench-history-v1",
              repo: $repo,
              workflow: {
                name: $workflow_name,
                run_id: $run_id,
                run_attempt: $run_attempt
              },
              git: {
                head_sha: $head_sha,
                head_ref: $head_ref,
                base_ref: $base_ref
              },
              request: {
                dispatch_id: (if $dispatch_id == "" then null else $dispatch_id end),
                trigger_source: $trigger_source,
                requested_by: (if $requested_by == "" then null else $requested_by end),
                pr_number: (if $pr_number == "" then null else ($pr_number | tonumber) end),
                request_command: (if $request_command == "" then null else $request_command end)
              },
              mobench: {
                version: $mobench_version,
                ref: $mobench_ref
              },
              platform_runs: [
                (if $ios_device_name == "" then empty else {
                  platform: "ios",
                  check_run_name: ($check_run_name + " - ios"),
                  workflow_inputs: {
                    platform: "ios",
                    device_profile: "${{ inputs.device_profile }}",
                    ios_device: "${{ inputs.ios_device }}",
                    ios_os_version: "${{ inputs.ios_os_version }}",
                    android_device: "${{ inputs.android_device }}",
                    android_os_version: "${{ inputs.android_os_version }}",
                    iterations: "${{ inputs.iterations }}",
                    warmup: "${{ inputs.warmup }}",
                    base_ref: $base_ref,
                    regression_threshold_pct: "${{ inputs.regression_threshold_pct }}",
                    pr_number: "${{ inputs.pr_number }}",
                    requested_by: $workflow_requested_by
                  },
                  resolved_device: {
                    device_name: $ios_device_name,
                    os_version: $ios_os_version
                  }
                } end),
                (if $android_device_name == "" then empty else {
                  platform: "android",
                  check_run_name: ($check_run_name + " - android"),
                  workflow_inputs: {
                    platform: "android",
                    device_profile: "${{ inputs.device_profile }}",
                    ios_device: "${{ inputs.ios_device }}",
                    ios_os_version: "${{ inputs.ios_os_version }}",
                    android_device: "${{ inputs.android_device }}",
                    android_os_version: "${{ inputs.android_os_version }}",
                    iterations: "${{ inputs.iterations }}",
                    warmup: "${{ inputs.warmup }}",
                    base_ref: $base_ref,
                    regression_threshold_pct: "${{ inputs.regression_threshold_pct }}",
                    pr_number: "${{ inputs.pr_number }}",
                    requested_by: $workflow_requested_by
                  },
                  resolved_device: {
                    device_name: $android_device_name,
                    os_version: $android_os_version
                  }
                } end)
              ]
            }' > history-bundle/manifest.json

      - name: Upload canonical history bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mobench-history-v1
          path: history-bundle
          if-no-files-found: error
          compression-level: 6
