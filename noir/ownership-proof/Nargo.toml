[package]
name = "ownership_proof"
type = "bin"
descrption = "UNAUDITED. ALPHA. Noir Circuit Implementation of WIP-103 (Proof of Ownership) for the World ID Protocol."
authors = ["Daniel Kales"]
license = "MIT"
backend = "provekit"

[dependencies]
poseidon2 = { tag = "v0.5.0-beta.0", git = "https://github.com/TaceoLabs/noir-poseidon", directory = "poseidon2" }
eddsa_poseidon2 = { git = "https://github.com/TaceoLabs/oprf-service.git", tag = "taceo-oprf-v0.11.0", directory = "noir/eddsa_poseidon2" }
binary_merkle_root = { git = "https://github.com/privacy-scaling-explorations/zk-kit.noir", tag = "binary-merkle-root-v0.0.1", directory = "packages/binary-merkle-root" }
